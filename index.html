<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KITA KITA SAJA</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/tesseract.min.js"></script>

<style>

/* ===== GANTI BACKGROUND DI SINI ===== */

body{
font-family:BREE SERIF;
background-image:url("https://i.pinimg.com/474x/b9/8c/a0/b98ca0aef64a30a7ad3b076027ec5d76.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:750px;
margin:100px auto;
background:rgba(0,0,0,0.65);
padding:35px;
border-radius:15px;
backdrop-filter:blur(6px);
display:flex;
flex-direction:column;
align-items:center;
}

h1{
margin-bottom:10px;
letter-spacing:2px;
}

.verse{
margin-bottom:20px;
font-size:15px;
opacity:0.9;
}

textarea{
width:100%;
height:200px;
margin-top:20px;
font-size:16px;
padding:12px;
border-radius:8px;
border:none;
resize:none;
}

button{
padding:10px 25px;
margin-top:15px;
cursor:pointer;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
}

button:hover{
background:#2563eb;
}

</style>

</head>

<body>

<div class="container">

<h1>KITA KITA SAJA</h1>

<div class="verse">
Saudara-saudara, aku sendiri tidak menganggap bahwa aku telah menangkapnya,
tetapi ini yang kulakukan: aku melupakan apa yang telah di belakangku
dan mengarahkan diri kepada apa yang di hadapanku.  
<b>Filipi 3:13</b>
</div>

<input type="file" id="imageInput">

<br>

<button onclick="copyText()">Copy Text</button>

<textarea id="result" placeholder="Hasil teks muncul di sini..."></textarea>

</div>

<script>

function runOCR(image){

Tesseract.recognize(
image,
'eng'
).then(({ data: { text } }) => {

/* hapus enter dan spasi */

let cleaned = text
.replace(/\n+/g,"")
.replace(/\s+/g,"")
.trim()

document.getElementById("result").value = cleaned

})

}

/* upload gambar */

document.getElementById('imageInput').addEventListener('change',function(){

const file = this.files[0]

runOCR(file)

})

/* paste screenshot */

document.addEventListener('paste',function(event){

const items = event.clipboardData.items

for (let i = 0; i < items.length; i++) {

if (items[i].type.indexOf("image") !== -1) {

const blob = items[i].getAsFile()

runOCR(blob)

}

}

})

/* copy text */

function copyText(){

const textarea = document.getElementById("result")

textarea.select()

document.execCommand("copy")

}

</script>

</body>
</html>
