<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OCR Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/tesseract.min.js"></script>

<style>

/* ===== GANTI LINK BACKGROUND DI SINI ===== */

body{
font-family:Arial;
background-image:url("https://i.pinimg.com/474x/b9/8c/a0/b98ca0aef64a30a7ad3b076027ec5d76.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:750px;
margin:auto;
background:rgba(0,0,0,0.65);
padding:35px;
border-radius:15px;
backdrop-filter:blur(6px);
}

textarea{
width:100%;
height:200px;
margin-top:20px;
font-size:16px;
padding:12px;
border-radius:8px;
border:none;
resize:none;
}

button{
padding:10px 25px;
margin-top:15px;
cursor:pointer;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
}

button:hover{
background:#2563eb;
}

</style>

</head>

<body>

<div class="container">

<h2>Image → Text OCR</h2>

<input type="file" id="imageInput">

<p>Tip: paste screenshot dengan <b>Ctrl + V</b></p>

<button onclick="copyText()">Copy Text</button>

<textarea id="result" placeholder="Hasil teks muncul di sini..."></textarea>

</div>

<script>

function runOCR(image){

Tesseract.recognize(
image,
'eng'
).then(({ data: { text } }) => {

let cleaned = text
.replace(/\n+/g," ")
.replace(/\s+/g," ")
.trim()

document.getElementById("result").value = cleaned

})

}

/* upload gambar */

document.getElementById('imageInput').addEventListener('change',function(){

const file = this.files[0]

runOCR(file)

})

/* paste gambar */

document.addEventListener('paste',function(event){

const items = event.clipboardData.items

for (let i = 0; i < items.length; i++) {

if (items[i].type.indexOf("image") !== -1) {

const blob = items[i].getAsFile()

runOCR(blob)

}

}

})

/* copy text */

function copyText(){

const textarea = document.getElementById("result")

textarea.select()

document.execCommand("copy")

}

</script>

</body>
</html>
