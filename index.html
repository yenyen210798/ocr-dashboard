<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KITA KITA SAJA</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/tesseract.min.js"></script>

<style>

/* ===== BACKGROUND ===== */
body{
font-family:Arial;
background-image:url("https://i.pinimg.com/736x/95/e3/3d/95e33d801f1220d9004716602c1eabfe.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
text-align:center;
padding:40px;
}

/* ===== PANEL UTAMA GLASS ===== */
.container{
max-width:750px;
margin:150px auto; /* turun ke bawah */
padding:35px;
border-radius:15px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
display:flex;
flex-direction:column;
align-items:center;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* ===== JUDUL ===== */
h1{
margin-bottom:10px;
letter-spacing:2px;
}

/* ===== AYAT ===== */
.verse{
margin-bottom:20px;
font-size:15px;
opacity:0.9;
}

/* ===== TEXTAREA (KOTAK PUTIH) ===== */
textarea{
width:80%;         /* lebih kecil dari 100% */
height:150px;       /* lebih compact */
margin-top:30px;
font-size:16px;
padding:10px;
border-radius:8px;
border:none;
resize:none;
color:#111;
background:rgba(255,255,255,0.9); /* semi-putih tapi jelas */
}

/* ===== BUTTON ===== */
button{
padding:10px 25px;
margin-top:15px;
cursor:pointer;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
}

button:hover{
background:#2563eb;
}

</style>
</head>

<body>

<div class="container">

<h1>KITA KITA SAJA</h1>

<div class="verse">
Saudara-saudara, aku sendiri tidak menganggap bahwa aku telah menangkapnya,
tetapi ini yang kulakukan: aku melupakan apa yang telah di belakangku
dan mengarahkan diri kepada apa yang di hadapanku.  
<b>Filipi 3:13</b>
</div>

<input type="file" id="imageInput">

<br>

<button onclick="copyText()">Copy Text</button>

<textarea id="result" placeholder="Hasil teks muncul di sini..."></textarea>

</div>

<script>

/* ===== OCR FUNCTION ===== */
function runOCR(image){
Tesseract.recognize(
image,
'eng'
).then(({ data: { text } }) => {

/* hapus enter & spasi, jadi satu baris */
let cleaned = text.replace(/\n+/g,"").replace(/\s+/g,"").trim()

document.getElementById("result").value = cleaned
})
}

/* ===== UPLOAD GAMBAR ===== */
document.getElementById('imageInput').addEventListener('change',function(){
const file = this.files[0]
runOCR(file)
})

/* ===== PASTE SCREENSHOT ===== */
document.addEventListener('paste',function(event){
const items = event.clipboardData.items
for (let i = 0; i < items.length; i++) {
if (items[i].type.indexOf("image") !== -1) {
const blob = items[i].getAsFile()
runOCR(blob)
}
}
})

/* ===== COPY TEXT ===== */
function copyText(){
const textarea = document.getElementById("result")
textarea.select()
document.execCommand("copy")
}

</script>
</body>
</html>
