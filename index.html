<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OCR Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/tesseract.min.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:10px;
}

textarea{
width:100%;
height:200px;
margin-top:20px;
font-size:16px;
padding:10px;
}

button{
padding:10px 20px;
margin-top:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Image → Text OCR</h2>

<input type="file" id="imageInput">

<br><br>

<button onclick="copyText()">Copy Text</button>

<textarea id="result" placeholder="Hasil teks akan muncul di sini..."></textarea>

</div>

<script>

document.getElementById('imageInput').addEventListener('change', function(){

const file = this.files[0]

Tesseract.recognize(
file,
'eng'
).then(({ data: { text } }) => {

document.getElementById("result").value = text

})

})

function copyText(){

const textarea = document.getElementById("result")

textarea.select()

document.execCommand("copy")

alert("Text copied!")

}

</script>

</body>
</html>
